<div class="contact-container">
    <section class="contact-section">
        <div class="contact-grid">
            <!-- Contact Information -->
            <div class="contact-info">
                <h2 class="info-title">Thông tin liên hệ</h2>
                <p class="info-description">
                    Hãy liên hệ với chúng tôi qua các kênh dưới đây hoặc điền vào form bên cạnh.
                    Chúng tôi sẽ phản hồi trong thời gian sớm nhất.
                </p>

                <div class="info-cards">
                    <div *ngFor="let info of contactInfo" class="info-card">
                        <div class="info-icon">
                            <i class="pi" [ngClass]="info.icon"></i>
                        </div>
                        <div class="info-details">
                            <h3 class="info-card-title">{{ info.title }}</h3>
                            <p class="info-card-content">{{ info.content }}</p>
                        </div>
                    </div>
                </div>

                <div class="social-links">
                    <h3 class="social-title">Kết nối với chúng tôi</h3>
                    <div class="social-icons">
                        <a href="#" class="social-icon" aria-label="Facebook">
                            <i class="pi pi-facebook"></i>
                        </a>
                        <a href="#" class="social-icon" aria-label="Twitter">
                            <i class="pi pi-twitter"></i>
                        </a>
                        <a href="#" class="social-icon" aria-label="LinkedIn">
                            <i class="pi pi-linkedin"></i>
                        </a>
                        <a href="#" class="social-icon" aria-label="Instagram">
                            <i class="pi pi-instagram"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form-wrapper">
                <h2 class="form-title">Gửi tin nhắn</h2>
                <form class="contact-form" (ngSubmit)="onSubmit()">
                    <div class="form-group">
                        <label for="name">Họ và tên *</label>
                        <input type="text" id="name" name="name" [(ngModel)]="formData.name" required
                            placeholder="Nhập họ và tên của bạn">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" [(ngModel)]="formData.email" required
                                placeholder="email@example.com">
                        </div>

                        <div class="form-group">
                            <label for="phone">Số điện thoại</label>
                            <input type="tel" id="phone" name="phone" [(ngModel)]="formData.phone"
                                placeholder="0123 456 789">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="subject">Tiêu đề *</label>
                        <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject" required
                            placeholder="Tiêu đề tin nhắn">
                    </div>

                    <div class="form-group">
                        <label for="message">Nội dung *</label>
                        <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="6"
                            placeholder="Nhập nội dung tin nhắn của bạn..."></textarea>
                    </div>

                    <button type="submit" class="submit-button">
                        <i class="pi pi-send"></i>
                        Gửi tin nhắn
                    </button>
                </form>
            </div>
        </div>
    </section>
</div>
